<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body { background: #111; color: #fff; padding: 50px; }
  .nav-logo {
    position: relative;
    display: inline-block;
  }
  .nav-logo img {
    height: 64px;
    opacity: 0; /* Hidden but provides dimensions */
  }
  .nav-logo::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    /* 3 intervals: grey, gold, grey at 30 degrees */
    background: linear-gradient(30deg, #808080 0%, #808080 33%, #d4af37 33%, #d4af37 66%, #808080 66%, #808080 100%);
    -webkit-mask-image: url('images/logo.webp');
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: left center;
  }
  
  .smooth::after {
    background: linear-gradient(30deg, #808080 0%, #d4af37 50%, #808080 100%);
  }
</style>
</head>
<body>
  <h2>Sharp intervals</h2>
  <a href="#" class="nav-logo">
    <img src="images/logo.webp" />
  </a>
  <br><br>
  <h2>Smooth intervals</h2>
  <a href="#" class="nav-logo smooth">
    <img src="images/logo.webp" />
  </a>
</body>
</html>
