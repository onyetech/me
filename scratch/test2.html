<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body { background: #111; color: #fff; padding: 50px; }
  
  .nav-logo {
    display: inline-block;
    width: 200px; /* Force width */
    height: 32px;
    background: linear-gradient(30deg, #808080 0%, #d4af37 50%, #808080 100%);
    -webkit-mask-image: url('images/logo.webp');
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-image: url('images/logo.webp');
    mask-size: contain;
    mask-repeat: no-repeat;
  }
  .nav-logo img {
    opacity: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
  <h2>Mask on container</h2>
  <a href="#" class="nav-logo">
    <img src="images/logo.webp" />
  </a>
</body>
</html>
